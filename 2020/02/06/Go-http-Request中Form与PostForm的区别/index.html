          <h1 class="post-title" itemprop="name headline">Go http.Request中Form与PostForm的区别</h1>
        

        <div class="post-meta">
          <span class="post-time">
            
              <span class="post-meta-item-icon">
                <i class="fa fa-calendar-o"></i>
              </span>

              </time>
            

            

            
          </span>

          

          
            
          

          
          

          

          

          

        </div>
      </header>
    

    
    
    
    <div class="post-body" itemprop="articleBody">

      
      

      
        <ul>
<li><code>Form</code>合并了<code>Query</code>和请求体表单的数据, 使用它可以同时获取两者数据</li>
<li><code>PostForm</code>仅仅包含请求体的表单数据</li>
</ul>
<p><strong>举个例子</strong></p>
<p><em>服务端代码</em></p>
<figure class="highlight go"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">package</span> main</span><br><span class="line"></span><br><span class="line"><span class="keyword">import</span> (</span><br><span class="line">	<span class="string">"fmt"</span></span><br><span class="line"></span><br><span class="line">	<span class="string">"github.com/gin-gonic/gin"</span></span><br><span class="line">)</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">main</span><span class="params">()</span></span> &#123;</span><br><span class="line">	router := gin.Default()</span><br><span class="line">	router.POST(<span class="string">"/"</span>, <span class="function"><span class="keyword">func</span><span class="params">(ctx *gin.Context)</span></span> &#123;</span><br><span class="line">        <span class="comment">// 值得注意的是, 使用PostForm和Form前必须用ParseForm()方法解析它们</span></span><br><span class="line">		<span class="keyword">if</span> err := ctx.Request.ParseForm(); err != <span class="literal">nil</span> &#123;</span><br><span class="line">			fmt.Println(err)</span><br><span class="line">			ctx.Writer.WriteString(<span class="string">"server error"</span>)</span><br><span class="line">		&#125;</span><br><span class="line">		ctx.Writer.WriteString(fmt.Sprintf(<span class="string">"PostForm的内容 %s\n"</span>, ctx.Request.PostForm))</span><br><span class="line">		ctx.Writer.WriteString(fmt.Sprintf(<span class="string">"Form的内容 %s"</span>, ctx.Request.Form))</span><br><span class="line">	&#125;)</span><br><span class="line"></span><br><span class="line">	router.Run(<span class="string">":8000"</span>)</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<p><em>请求</em></p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line">POST &#x2F;?data1&#x3D;hello&amp;name&#x3D;markity HTTP&#x2F;1.1</span><br><span class="line">Host: 127.0.0.1:8000</span><br><span class="line">Content-Type: application&#x2F;x-www-form-urlencoded</span><br><span class="line"></span><br><span class="line">data1&#x3D;world&amp;data2&#x3D;你好</span><br></pre></td></tr></table></figure>

<p><em>响应</em></p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line">PostForm的内容 map[data1:[world] data2:[你好]]</span><br><span class="line">Form的内容 map[data1:[world hello] data2:[你好] name:[markity]]</span><br></pre></td></tr></table></figure>
